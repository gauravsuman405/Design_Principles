kind = "web"
previewPath = "/"
title = "Enhancing User Experience through Graphic Design Principles"
version = "1.0.0"
id = "artifacts/design-principles"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23373

[services.development]
run = "pnpm --filter @workspace/design-principles run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/design-principles", "run", "build" ]
publicDir = "artifacts/design-principles/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23373"
BASE_PATH = "/"
